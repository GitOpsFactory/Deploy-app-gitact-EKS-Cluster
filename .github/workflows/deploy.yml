name: Deploy Application to Amazon EKS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  CLUSTER_NAME: TCS-EKS-Cluster-01
  ECR_REPOSITORY: nginx-app
  DEPLOYMENT_NAME: nginx
  CONTAINER_NAME: nginx
  K8S_NAMESPACE: default

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t $ECR_REPOSITORY .

      - name: Tag Docker Image
        run: |
          docker tag $ECR_REPOSITORY:latest \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}

      - name: Push Docker Image
        run: |
          docker push \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name $CLUSTER_NAME \
            --region $AWS_REGION

      - name: Deploy Kubernetes Manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Update Deployment Image
        run: |
          kubectl set image deployment/$DEPLOYMENT_NAME \
            $CONTAINER_NAME=${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }} \
            -n $K8S_NAMESPACE

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/$DEPLOYMENT_NAME \
            -n $K8S_NAMESPACE \
            --timeout=300s

      - name: Verify Deployment
        run: |
          echo "===== Deployments ====="
          kubectl get deployment -n $K8S_NAMESPACE

          echo "===== Pods ====="
          kubectl get pods -o wide -n $K8S_NAMESPACE

          echo "===== Services ====="
          kubectl get svc -n $K8S_NAMESPACE

          echo "===== Ingress ====="
          kubectl get ingress -n $K8S_NAMESPACE