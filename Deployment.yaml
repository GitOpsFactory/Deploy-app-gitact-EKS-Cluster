apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx

spec:
  replicas: 2

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      containers:

      - name: nginx

        image: 300156334215.dkr.ecr.ap-south-1.amazonaws.com/nginx-app:latest

        ports:

        - containerPort: 80